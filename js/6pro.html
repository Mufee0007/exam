<!-- Program 6: Write a JavaScript program to calculate
the squares and cubes of numbers from 0 to 10. -->
<!DOCTYPE html>
<html>
<body>
<table border="1">
<tr>
<th>Number</th>
<th>Square</th>
<th>Cube</th>
</tr>
<script>
for (let i = 0; i <= 10; i++) {
 document.write("<tr>");
 document.write("<td>" + i + "</td>");
 document.write("<td>" + (i*i) + "</td>");
 document.write("<td>" + (i*i*i) + "</td>");
 document.write("</tr>");
}
</script>
</table>
</body>
</html>
