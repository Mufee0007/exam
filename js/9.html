<!-- Program 9: Write a JavaScript program to
calculate factorial of a number using HTML. -->
<!DOCTYPE html>
<html>
<body>
<input type="number" id="n">
<button onclick="fact()">Factorial</button>
<p id="ans"></p>
<script>
function fact() {
 let num = parseInt(n.value);
 let f = 1;
 for (let i = 1; i <= num; i++) {
 f *= i;
 }
 ans.innerHTML = "Factorial = " + f;
}
</script>
</body>
</html>
